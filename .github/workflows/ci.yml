name: CodeGuard Copilot CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', '.vscode/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .
      - run: python -c "from codeguard.engine import CodeGuardEngine; e = CodeGuardEngine(); assert e.get_pattern_count() == 32"
      - run: python -m pytest tests/test_codeguard.py -v

  self-scan:
    name: Self-Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .
      - run: python -c "from codeguard.engine import CodeGuardEngine; e = CodeGuardEngine(); assert e.get_pattern_count() == 32"
      - run: raven-guard version
      - run: raven-guard scan codeguard/ --format json
      - run: raven-guard doctor
